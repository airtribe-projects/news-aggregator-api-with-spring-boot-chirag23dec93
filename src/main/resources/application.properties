# Server Configuration
server.port=8080

# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:newsdb;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=pxpChI72SPe9nIXzwLVInjvJTMmPeorHLD41kPN0pCE=
jwt.expiration=3600000

# News API Configuration
news.api.key=ed6fa319ed6644c2994fc0a012681c85
news.api.base-url=https://newsapi.org/v2

# News Cache Configuration
news.cache.update.interval=900000
news.cache.cleanup.interval=3600000
news.cache.user-inactivity-threshold=86400000

# WebClient Configuration
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=DEBUG
logging.level.reactor.netty.http.client=DEBUG
spring.codec.max-in-memory-size=2MB

# Logging Configuration
logging.level.root=INFO
logging.level.com.airtribe.newsaggregator=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.scheduling=INFO
logging.level.org.hibernate=ERROR
logging.file.path=logs/
logging.file.name=logs/news-aggregator.log

# Cache Configuration
spring.cache.cache-names=newsCache,searchCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=900s

# Scheduling Configuration
spring.task.scheduling.pool.size=5